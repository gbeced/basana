version: 2

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.10"
  jobs:
    post_create_environment:
      # Install uv
      - pip install uv
      # Build and install basana.
      - uv build
      - pip install "dist/basana-$(uv version).tar.gz[charts]"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true